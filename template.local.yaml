AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

# Local-only template: builds x86_64 image so sam local invoke works on amd64 dev machines.
# For production deployment, use template.yaml (arm64).

Globals:
  Function:
    Timeout: 300
    MemorySize: 4096
    Architectures:
      - x86_64

Resources:
  TccEtlFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageUri: tccetlfunction:latest
      Environment:
        Variables:
          S3_BUCKET: !Ref TccEtlBucket
          PANDERA_VALIDATION_DEPTH: SCHEMA_AND_DATA
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "arn:aws:s3:::${TccEtlBucket}/*"
      Events:
        MonthlySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 22 20 * ? *)"
            Description: "Run FRED-MD ETL monthly on the 20th at 22:00 UTC"
    Metadata:
      DockerContext: .
      Dockerfile: docker/Dockerfile
      DockerTag: tccetlfunction
      DockerBuildArgs:
        LAMBDA_ARCH: "x86_64"

  TccEtlBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "tcc-etl-${AWS::AccountId}-${AWS::Region}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90

Outputs:
  BucketName:
    Value: !Ref TccEtlBucket
  FunctionName:
    Value: !Ref TccEtlFunction
  FunctionArn:
    Value: !GetAtt TccEtlFunction.Arn
