name: CodeQL – SAST

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    # Weekly deep scan every Monday at 01:30 UTC
    - cron: "30 1 * * 1"

jobs:
  analyze:
    name: CodeQL Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # security-and-quality adds ~30 extra Python checks over the default suite
          # (taint-flow analysis: tracks data from httpx/boto3 responses into sinks)
          queries: security-and-quality

      # No autobuild step needed — CodeQL interprets Python directly
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:python
